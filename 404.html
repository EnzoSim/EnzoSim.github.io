<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page not found · Enzo Simier</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8f4;
        --foreground: #151515;
        --body-copy: #56534e;
        --muted: #716d66;
        --evergreen: #244235;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        color: var(--foreground);
        background: linear-gradient(180deg, #fff 0%, #fcfdfb 48%, #fafcf8 100%);
        font-family: "Geist Variable", "Geist", -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      main {
        position: relative;
        z-index: 1;
        max-width: 34rem;
        padding: 2rem 1.5rem 3rem;
        text-align: center;
      }

      .kicker {
        margin: 0 0 1.4rem;
        color: var(--evergreen);
        font-family: "Geist Mono Variable", "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.7rem;
        font-weight: 620;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.9rem, 9vw, 4.4rem);
        font-weight: 650;
        line-height: 0.94;
        letter-spacing: -0.055em;
        text-wrap: balance;
      }

      p {
        margin: 1.15rem auto 0;
        max-width: 24rem;
        color: var(--body-copy);
        font-size: 0.98rem;
        line-height: 1.6;
      }

      nav {
        display: flex;
        margin-top: 1.75rem;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.45rem;
      }

      nav a {
        position: relative;
        display: inline-flex;
        min-height: 2.75rem;
        align-items: center;
        padding: 0 1.1rem;
        overflow: hidden;
        border: 1px solid rgb(36 66 53 / 15%);
        border-radius: 999px;
        color: var(--foreground);
        background: rgb(255 255 255 / 68%);
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 96%),
          inset 0 -1px 0 rgb(21 21 21 / 5%),
          0 11px 25px rgb(36 66 53 / 8%);
        -webkit-backdrop-filter: blur(18px) saturate(120%);
        backdrop-filter: blur(18px) saturate(120%);
        font-size: 0.86rem;
        font-weight: 540;
        text-decoration: none;
      }

      nav a::before {
        position: absolute;
        inset: 1px 12% auto;
        height: 1px;
        border-radius: 999px;
        background: rgb(255 255 255 / 88%);
        content: "";
        pointer-events: none;
      }

      nav a:hover {
        border-color: rgb(36 66 53 / 24%);
        background: rgb(255 255 255 / 90%);
      }

      nav a:focus-visible {
        outline: 2px solid var(--evergreen);
        outline-offset: 2px;
      }

      .ambient {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .ambient span {
        position: absolute;
        display: block;
        aspect-ratio: 1;
        border: 1px solid rgb(255 255 255 / 74%);
        opacity: 0.7;
      }

      .ambient span:first-child {
        top: -22%;
        left: -8%;
        width: clamp(18rem, 38vw, 34rem);
        border-radius: 55% 45% 61% 39% / 48% 56% 44% 52%;
        background:
          radial-gradient(circle at 34% 28%, rgb(255 255 255 / 92%) 0 9%, transparent 30%),
          linear-gradient(145deg, rgb(222 231 205 / 88%), rgb(192 213 190 / 62%));
      }

      .ambient span:last-child {
        right: -7%;
        bottom: -24%;
        width: clamp(19rem, 36vw, 33rem);
        border-radius: 49% 51% 39% 61% / 58% 44% 56% 42%;
        background:
          radial-gradient(circle at 31% 24%, rgb(255 255 255 / 88%) 0 10%, transparent 31%),
          linear-gradient(150deg, rgb(220 232 216 / 84%), rgb(172 202 179 / 57%));
      }

      @media (prefers-reduced-transparency: reduce), (prefers-contrast: more) {
        body {
          background: #fff;
        }

        .ambient {
          display: none;
        }

        nav a {
          background: #fff;
          -webkit-backdrop-filter: none;
          backdrop-filter: none;
        }
      }

      @media (prefers-contrast: more) {
        nav a {
          border-color: rgb(21 21 21 / 55%);
        }
      }
    </style>
  </head>
  <body>
    <div class="ambient" aria-hidden="true"><span></span><span></span></div>
    <main>
      <p class="kicker">404</p>
      <h1>Page not found</h1>
      <p>This address does not exist on the site. The three pages below cover everything here.</p>
      <nav aria-label="Site pages">
        <a href="/">About</a>
        <a href="/projects/">Projects</a>
        <a href="/reading/">Reading</a>
      </nav>
    </main>
  </body>
</html>
