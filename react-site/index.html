<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enzo Simier, applied economics, industrial organization, research, and projects."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="canonical" href="https://enzosimier.com/" />
    <link rel="icon" href="/favicon.ico" />
    <meta property="og:title" content="Enzo Simier · Applied Economics & IO" />
    <meta
      property="og:description"
      content="Applied economics, industrial organization, research, and projects."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://enzosimier.com/" />
    <meta property="og:locale" content="en_CA" />
    <meta property="og:locale:alternate" content="fr_CA" />
    <title>Enzo Simier · Applied Economics & IO</title>
    <script>
      ;(function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark')
          }
          var lang = localStorage.getItem('lang')
          if (lang !== 'en' && lang !== 'fr') {
            lang = (navigator.language || 'en').toLowerCase().indexOf('fr') === 0 ? 'fr' : 'en'
          }
          document.documentElement.lang = lang
        } catch (error) {
          /* pre-paint bootstrap only; React re-applies both settings */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
